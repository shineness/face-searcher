name: Build EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install opencv-python numpy Pillow pyinstaller
          
      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "人脸搜索工具" face_searcher.py
        
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 人脸搜索工具-exe
          path: dist/人脸搜索工具.exe
